<div #dropdownContainer class="pr-timezone-row">
	<div
		class="pr-timezone-select"
		[class.disabled]="disabled"
		role="button"
		tabindex="0"
		(click)="toggle()"
		(keydown.enter)="toggle()"
		(keydown.space)="toggle()"
	>
		<span class="pr-timezone-value">{{ selected?.offset }}</span>
		<span class="pr-timezone-label">{{
			selected?.label || 'Select timezone'
		}}</span>
		<span class="pr-icon-button pr-chevron">
			<i class="material-icons">unfold_more</i>
		</span>
	</div>
	@if (isOpen()) {
		<div class="pr-timezone-dropdown">
			<input
				type="text"
				class="pr-timezone-search"
				placeholder="Search timezone..."
				[value]="filter()"
				(input)="filter.set($any($event.target).value)"
			/>
			<div class="pr-timezone-options">
				<div
					class="pr-timezone-option"
					role="option"
					tabindex="0"
					[class.selected]="!selected"
					(click)="select(null)"
					(keydown.enter)="select(null)"
					(keydown.space)="select(null)"
				>
					<span class="pr-tz-name">Select timezone</span>
				</div>
				@for (tz of filteredTimezones(); track tz.ianaZone) {
					<div
						class="pr-timezone-option"
						role="option"
						tabindex="0"
						[class.selected]="tz.ianaZone === selected?.ianaZone"
						(click)="select(tz)"
						(keydown.enter)="select(tz)"
						(keydown.space)="select(tz)"
					>
						<span class="pr-tz-offset">{{ tz.offset }}</span>
						<span class="pr-tz-name">{{ tz.label }}</span>
					</div>
				}
			</div>
		</div>
	}
</div>
