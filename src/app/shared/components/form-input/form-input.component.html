<!-- @format -->
<div class="input-vertical-label" [ngClass]="{ hidden: isLabelHidden() }">
  {{ placeholder }}
</div>
<input
  *ngIf="type !== 'select'"
  [type]="type"
  class="form-control"
  [ngClass]="{ 'validate-dirty': config && config.validateDirty }"
  [id]="fieldName"
  [name]="fieldName"
  [placeholder]="placeholder"
  [formControl]="control"
  [disabled]="disabled"
  [readOnly]="disabled"
/>
<div class="select-wrapper" *ngIf="type === 'select'">
  <select
    class="form-control input-vertical real-select"
    [ngClass]="{ placeholder: !control.value }"
    [id]="fieldName"
    [name]="fieldName"
    [formControl]="control"
  >
    <option *ngFor="let option of selectOptions" [value]="option.value">
      {{ option.text }}
    </option>
  </select>
  <label
    class="open-toggle input-vertical-select-placeholder"
    [attr.for]="fieldName"
    [class.selected]="control.value"
    (click)="openSelect()"
  >
    {{ getOptionTextFromValue(control.value) || placeholder }}
  </label>
</div>
<div class="input-vertical-error" [ngClass]="{ hidden: !errors }">
  {{ errors }}
</div>
